<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Seonghyun Eom — Software Engineer</title>
  <desc id="desc">A transparent banner with large type and original pixel art inspired by video systems and software.</desc>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="38" y="42" fill="#57606a" font-size="18">eomsteve.exe</text>
    <text x="36" y="104" fill="#1f2328" font-size="52" font-weight="800" letter-spacing="0.5">SEONGHYUN EOM</text>
    <text x="38" y="145" fill="#57606a" font-size="23">software engineer</text>
    <rect x="38" y="169" width="84" height="7" fill="#1f883d"/>
    <rect x="130" y="169" width="28" height="7" fill="#8250df"/>
    <rect x="166" y="169" width="12" height="7" fill="#1f2328"/>
  </g>

  <g transform="translate(730 23)">
    <!-- pixel CCTV camera -->
    <rect x="0" y="61" width="72" height="44" fill="#1f883d"/>
    <rect x="12" y="49" width="44" height="12" fill="#1f2328"/>
    <rect x="72" y="69" width="20" height="28" fill="#1f2328"/>
    <rect x="16" y="105" width="12" height="18" fill="#1f2328"/>
    <rect x="8" y="123" width="32" height="10" fill="#1f2328"/>
    <rect x="20" y="73" width="10" height="10" fill="#f6f8fa"/>
    <rect x="30" y="73" width="10" height="10" fill="#1f2328"/>
    <rect x="20" y="83" width="10" height="10" fill="#1f2328"/>
    <rect x="30" y="83" width="10" height="10" fill="#f6f8fa"/>

    <!-- data pixels -->
    <rect x="112" y="77" width="12" height="12" fill="#1f883d"/>
    <rect x="136" y="77" width="12" height="12" fill="#8250df"/>
    <rect x="160" y="77" width="12" height="12" fill="#57606a"/>

    <!-- pixel terminal -->
    <rect x="192" y="18" width="244" height="142" fill="none" stroke="#1f2328" stroke-width="6"/>
    <rect x="208" y="34" width="12" height="12" fill="#cf222e"/>
    <rect x="228" y="34" width="12" height="12" fill="#bf8700"/>
    <rect x="248" y="34" width="12" height="12" fill="#1f883d"/>
    <rect x="208" y="58" width="212" height="6" fill="#d0d7de"/>

    <rect x="220" y="85" width="10" height="10" fill="#8250df"/>
    <rect x="230" y="75" width="10" height="10" fill="#8250df"/>
    <rect x="230" y="95" width="10" height="10" fill="#8250df"/>
    <rect x="250" y="75" width="10" height="10" fill="#8250df"/>
    <rect x="250" y="95" width="10" height="10" fill="#8250df"/>
    <rect x="260" y="85" width="10" height="10" fill="#8250df"/>

    <rect x="286" y="78" width="44" height="8" fill="#1f2328"/>
    <rect x="286" y="94" width="76" height="8" fill="#57606a"/>
    <rect x="286" y="110" width="58" height="8" fill="#1f883d"/>

    <rect x="208" y="146" width="12" height="6" fill="#1f883d"/>
    <rect x="228" y="146" width="36" height="6" fill="#d0d7de"/>
